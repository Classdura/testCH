        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; display: flex; justify-content: center; padding: 20px; }

        /* Стили меню */
        .menu-container { text-align: center; display: flex; flex-direction: column; gap: 15px; }

        /* Стили кнопок режимов */
        .berserk { background: #dc3545; }
        .random { background: #007bff; }
        .chaos { background: #6f42c1; }

        /* Скрытые секции */
        #quiz-ui, #results-ui { display: none; }

        /* Стили теста */
        .option { padding: 12px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; margin-bottom: 8px; }
        .option:hover { background: #f8f9fa; border-color: #ddd; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-nav { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; }
        .error-item { margin-bottom: 15px; padding: 10px; border-left: 4px solid #dc3545; background: #fff5f5; }
    </style>
</head>

<div class="container">
    <div id="menu-ui" class="menu-container">

    </div>

    <div id="quiz-ui">

        </div>

        <div id="options-area"></div>
        <div class="controls">
            <button class="btn-nav" onclick="prevQuestion()">⬅ Назад</button>
			<button class="btn-nav" onclick="goToQuestion()">🔎 Перейти к...</button>

    </div>

        <div id="error-list"></div>

    let questions = []; // Это рабочий массив для текущей игры
    let currentQ = 0;
    let userAnswers = [];

function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startQuiz(mode) {
        // Проверка: загружены ли вопросы
        if (typeof allQuestions === 'undefined' || allQuestions.length === 0) {
            alert("Ошибка: Вопросы не загружены!");
            return;
        }

        if (mode === 'berserk') {
            questions = [...allQuestions];
        } else if (mode === 'chaos') {
            questions = shuffle(allQuestions);
        } else if (mode === 'random') {
            let count = prompt(`Сколько вопросов? (Всего: ${allQuestions.length})`, "10");
            if (count === null) return;
            questions = shuffle(allQuestions).slice(0, parseInt(count) || 10);
        }

        userAnswers = new Array(questions.length).fill(null);
        currentQ = 0;
        
        document.getElementById('menu-ui').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('total-q').innerText = questions.length;
        
        showQuestion();
    }
	function goToQuestion() {
    let target = prompt(`Введите номер вопроса (1 - ${questions.length}):`, currentQ + 1);
    if (target === null) return;
    
    let num = parseInt(target);
    if (!isNaN(num) && num >= 1 && num <= questions.length) {
        currentQ = num - 1;
        showQuestion();
    } else {
        alert("Некорректный номер вопроса");
    }
}

function showQuestion() {
    const q = questions[currentQ];
    document.getElementById('q-num').innerText = currentQ + 1;
    document.getElementById('q-text').innerText = q.q;
    
    const area = document.getElementById('options-area');
    area.innerHTML = '';

    q.options.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        
        // Если на этот вопрос уже отвечали (при возврате назад)
        if (userAnswers[currentQ] !== null) {
            if (i === q.correct) btn.style.background = '#d4edda'; // зеленый
            else if (i === userAnswers[currentQ]) btn.style.background = '#f8d7da'; // красный
        }

        btn.innerText = opt;
        btn.onclick = () => {
            // Если ответ уже дан, не даем нажать второй раз
            if (userAnswers[currentQ] !== null) return;

            userAnswers[currentQ] = i;

            // МГНОВЕННАЯ ПРОВЕРКА
            if (i === q.correct) {
                btn.style.background = '#d4edda'; // Красим в зеленый
                btn.style.borderColor = '#28a745';
            } else {
                btn.style.background = '#f8d7da'; // Красим в красный
                btn.style.borderColor = '#dc3545';
                
                // Подсвечиваем правильный, чтобы ты его видел
                const correctBtn = area.querySelectorAll('.option')[q.correct];
                correctBtn.style.background = '#d4edda';
                correctBtn.style.borderColor = '#28a745';
            }

            updateStats();

            // Небольшая задержка перед переходом к следующему вопросу (800мс)
            setTimeout(() => {
                if (currentQ < questions.length - 1) {
                    currentQ++;
                    showQuestion();
                } else {
                    finishQuiz();
                }
            }, 800);
        };
        area.appendChild(btn);
    });
}

    function nextQuestion() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            showQuestion();
        }
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            showQuestion();
        }
    }

    function updateStats() {
        let correct = userAnswers.filter((ans, i) => ans === questions[i].correct).length;
        document.getElementById('score').innerText = correct;
    }
function getGrade(percent, type) {
    if (type === 'middle') {
        if (percent >= 90) return { mark: 5, text: 'Отлично' };
        if (percent >= 75) return { mark: 4, text: 'Хорошо' };
        if (percent >= 50) return { mark: 3, text: 'Удовл.' };
        return { mark: 2, text: 'Неудовл.' };
    } else { // высшая
        if (percent >= 91) return { mark: 5, text: 'Отлично' };
        if (percent >= 77) return { mark: 4, text: 'Хорошо' };
        if (percent >= 63) return { mark: 3, text: 'Удовл.' };
        return { mark: 2, text: 'Неудовл.' };
    }
}
    function finishQuiz() {
    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('results-ui').style.display = 'block';

    let correct = userAnswers.filter((ans, i) => ans === questions[i].correct).length;
    let percent = Math.round((correct / questions.length) * 100);
    
    // Получаем оценки
    let middleGrade = getGrade(percent, 'middle');
    let highGrade = getGrade(percent, 'high');

    // Формируем текст результата
    document.getElementById('final-score-text').innerHTML = `
        <div style="font-size: 1.2em; margin-bottom: 10px;">
            Результат: <b>${correct} из ${questions.length}</b> (${percent}%)
        </div>
        <div style="background: #f0f4f8; padding: 15px; border-radius: 10px; text-align: left; display: inline-block;">
            <b>Ваша оценка:</b><br>
            • По среднему оцениванию: <span style="color:#007bff">${middleGrade.mark} (${middleGrade.text})</span><br>
            • По высокому оцениванию: <span style="color:#6f42c1">${highGrade.mark} (${highGrade.text})</span>
        </div>
    `;

    const errorList = document.getElementById('error-list');
    errorList.innerHTML = '<h3>Разбор ошибок:</h3>';
    
    questions.forEach((q, i) => {
        if (userAnswers[i] !== q.correct) {
            const item = document.createElement('div');
            item.className = 'error-item';
            item.innerHTML = `
                <b>Вопрос:</b> ${q.q}<br>
                <span style="color:red">Ваш ответ: ${userAnswers[i] !== null && userAnswers[i] !== undefined ? q.options[userAnswers[i]] : 'Пропущено'}</span><br>
                <span style="color:green">Правильный: ${q.options[q.correct]}</span>
            `;
            errorList.appendChild(item);
        }
    });
}
