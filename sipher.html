<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шифратор / Дешифратор Кастомных Шифров</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --container-bg: #ffffff;
            --border-color: #cbd5e1;
            --accent-color: #0284c7;
            --btn-hover: #f1f5f9;
            --danger-color: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--container-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        h1, h2 {
            margin-top: 0;
            color: var(--accent-color);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button, label.btn-label {
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover, label.btn-label:hover {
            background: var(--btn-hover);
            border-color: var(--accent-color);
        }

        .btn-danger {
            color: var(--danger-color);
            background: transparent;
            border: 1px solid var(--border-color);
        }
        .btn-danger:hover {
            background: #fef2f2;
            border-color: var(--danger-color);
        }

        .hidden-input { display: none; }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .separators-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .sep-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .sep-field input {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: center;
        }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 8px;
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            margin-bottom: 10px;
        }

        .letter-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--container-bg);
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .letter-box span {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .letter-box input {
            width: 80%;
            text-align: center;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px;
        }

        .text-area-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .textarea-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .textarea-actions {
            display: flex;
            gap: 5px;
        }

        .textarea-actions button {
            padding: 3px 8px;
            font-size: 0.85rem;
        }

        textarea {
            width: 100%;
            height: 110px;
            resize: vertical;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .actions button {
            flex: 1;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
        }
        .actions button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Шифратор / Дешифратор</h1>

        <div class="toolbar">
            <button onclick="app.switchAlphabet('ru')">Кириллица</button>
            <button onclick="app.switchAlphabet('en')">Латынь</button>
            <button onclick="app.exportCipher()">Экспорт шифра (Скачать JSON)</button>
            <label class="btn-label">
                Импорт шифра <input type="file" class="hidden-input" accept=".json" onchange="app.importCipher(event)">
            </label>
        </div>

        <div class="grid-layout">
            <div>
                <h2>Конструктор шифра (<span id="alphabet-type">RU</span>)</h2>
                
                <div class="separators-group">
                    <div class="sep-field">
                        <label for="sep-letter">Разделитель букв:</label>
                        <input type="text" id="sep-letter" placeholder="Например: /" oninput="app.updateSeparator('letterSeperator', this.value)">
                    </div>
                    <div class="sep-field">
                        <label for="sep-space">Разделитель пробелов:</label>
                        <input type="text" id="sep-space" placeholder="Например: [space]" oninput="app.updateSeparator('spaceSeperator', this.value)">
                    </div>
                </div>

                <div class="alphabet-grid" id="alphabet-grid"></div>
                <button class="btn-danger" style="width: 100%;" onclick="app.clearAlphabetGrid()">Очистить символы в конструкторе</button>
            </div>

            <div class="text-area-group">
                <h2>Шифрование и Дешифрование</h2>
                
                <div class="textarea-header">
                    <label for="source-text">Исходный текст:</label>
                    <div class="textarea-actions">
                        <button onclick="app.copyText('source-text')">Скопировать</button>
                        <button onclick="app.clearText('source-text')">Очистить</button>
                    </div>
                </div>
                <textarea id="source-text" placeholder="Введите текст..."></textarea>

                <div class="actions">
                    <button onclick="app.process(true)">Зашифровать ↑</button>
                    <button onclick="app.process(false)">Дешифровать ↓</button>
                </div>

                <div class="textarea-header">
                    <label for="result-text">Результат:</label>
                    <div class="textarea-actions">
                        <button onclick="app.copyText('result-text')">Скопировать</button>
                        <button onclick="app.clearText('result-text')">Очистить</button>
                    </div>
                </div>
                <textarea id="result-text" readonly placeholder="Здесь появится результат..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const alphabets = {
            ru: "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ",
            en: "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
        };

        const app = {
            state: {
                lang: 'ru',
                ciphers: {
                    ru: { rules: {}, letterSeperator: "/", spaceSeperator: " " },
                    en: { rules: {}, letterSeperator: "/", spaceSeperator: " " }
                }
            },

            init() {
                const saved = localStorage.getItem('cipherAppData_v3');
                if (saved) {
                    try {
                        this.state = JSON.parse(saved);
                    } catch (e) {
                        console.error("Ошибка загрузки", e);
                    }
                } else {
                    this.generateDefaultRules('ru');
                    this.generateDefaultRules('en');
                }
                this.render();
            },

            saveState() {
                localStorage.setItem('cipherAppData_v3', JSON.stringify(this.state));
            },

            generateDefaultRules(lang) {
                this.state.ciphers[lang].rules = {};
                const letters = alphabets[lang];
                for (let letter of letters) {
                    this.state.ciphers[lang].rules[letter] = "";
                }
            },

            switchAlphabet(lang) {
                this.state.lang = lang;
                this.saveState();
                this.render();
            },

            updateRule(letter, value) {
                this.state.ciphers[this.state.lang].rules[letter] = value;
                this.saveState();
            },

            updateSeparator(type, value) {
                this.state.ciphers[this.state.lang][type] = value;
                this.saveState();
            },

            clearAlphabetGrid() {
                if (confirm("Очистить все поля текущего конструктора?")) {
                    const currentCipher = this.state.ciphers[this.state.lang];
                    for (let letter in currentCipher.rules) {
                        currentCipher.rules[letter] = "";
                    }
                    currentCipher.letterSeperator = "/";
                    currentCipher.spaceSeperator = " ";
                    this.saveState();
                    this.render();
                }
            },

            copyText(id) {
                const textarea = document.getElementById(id);
                textarea.select();
                navigator.clipboard.writeText(textarea.value);
            },

            clearText(id) {
                document.getElementById(id).value = "";
            },

            stateCurrent() {
                return this.state.ciphers[this.state.lang];
            },

            // ИСПРАВЛЕННАЯ ЛОГИКА ШИФРОВАНИЯ И ДЕШИФРОВАНИЯ
            process(isEncrypt) {
                const sourceText = document.getElementById('source-text').value;
                const current = this.stateCurrent();
                const lSep = current.letterSeperator;
                const sSep = current.spaceSeperator;

                if (isEncrypt) {
                    let encryptedTokens = [];
                    
                    for (let char of sourceText) {
                        if (char === " ") {
                            encryptedTokens.push(sSep);
                        } else {
                            const upperChar = char.toUpperCase();
                            // Проверяем, задано ли кастомное значение правила
                            if (current.rules[upperChar] && current.rules[upperChar] !== "") {
                                encryptedTokens.push(current.rules[upperChar]);
                            } else {
                                encryptedTokens.push(char); // Если правила нет, оставляем символ
                            }
                        }
                    }
                    // Склеиваем токены через разделитель букв
                    document.getElementById('result-text').value = encryptedTokens.join(lSep);

                } else {
                    // --- ИСПРАВЛЕННОЕ ДЕШИФРОВАНИЕ ---
                    const reverseRules = {};
                    for (let key in current.rules) {
                        const val = current.rules[key];
                        if (val && val !== "") {
                            reverseRules[val] = key; // Точное сопоставление (например, "ыыы": "А")
                        }
                    }

                    // Если разделитель букв задан, парсим по нему (надежный способ для многосимвольных шифров)
                    if (lSep !== "") {
                        const tokens = sourceText.split(lSep);
                        let decryptedText = "";

                        for (let token of tokens) {
                            if (token === sSep) {
                                decryptedText += " ";
                            } else if (reverseRules[token]) {
                                decryptedText += reverseRules[token];
                            } else {
                                decryptedText += token; // Неизвестный символ/токен оставляем как есть
                            }
                        }
                        document.getElementById('result-text').value = decryptedText;
                    } else {
                        // Если разделителя нет, дешифруем посимвольно (работает корректно только для замен 1 в 1)
                        let decryptedText = "";
                        let tempText = sourceText;
                        if (sSep !== " " && sSep !== "") {
                            tempText = tempText.split(sSep).join(" ");
                        }

                        for (let char of tempText) {
                            if (char === " ") {
                                decryptedText += " ";
                            } else if (reverseRules[char]) {
                                decryptedText += reverseRules[char];
                            } else {
                                decryptedText += char;
                            }
                        }
                        document.getElementById('result-text').value = decryptedText;
                    }
                }
            },

            exportCipher() {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.state));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `cipher_config.json`);
                downloadAnchor.click();
            },

            importCipher(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (parsed.ciphers && parsed.lang) {
                            this.state = parsed;
                            this.saveState();
                            this.render();
                        } else {
                            alert("Неверный формат файла шифра.");
                        }
                    } catch (err) {
                        alert("Ошибка при чтении файла.");
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            },

            render() {
                document.getElementById('alphabet-type').innerText = this.state.lang.toUpperCase();
                
                const current = this.stateCurrent();
                document.getElementById('sep-letter').value = current.letterSeperator;
                document.getElementById('sep-space').value = current.spaceSeperator;

                const grid = document.getElementById('alphabet-grid');
                grid.innerHTML = '';

                for (let letter in current.rules) {
                    const value = current.rules[letter];
                    const box = document.createElement('div');
                    box.className = 'letter-box';
                    box.innerHTML = `
                        <span>${letter}</span>
                        <input type="text" value="${value}" oninput="app.updateRule('${letter}', this.value)">
                    `;
                    grid.appendChild(box);
                }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
