<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты</title>
    <style>
        /* --- Frutiger Aero Эстетика --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 30%, #7dd3fc 70%, #38bdf8 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #334155;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Пузыри на фоне в стиле Frutiger Aero */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5), 0 10px 30px rgba(0, 0, 0, 0.05);
            z-index: -1;
            filter: blur(5px);
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; width: 400px; height: 400px; }

        /* Основной экран (Контейнер меню) */
        .screen {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.6);
            width: 100%;
            max-width: 900px;
            text-align: center;
            transition: all 0.5s ease;
        }

        /* Заголовок "Проекты" оформлен в стиле верхнего плаката */
        .header-plate {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            padding: 15px 20px;
            margin-bottom: 35px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05), inset 0 2px 4px rgba(255,255,255,0.8);
            font-size: 2rem;
            font-weight: 700;
            color: #0369a1;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }

        /* Сетка для объемных кнопок (3 колонки как на макете) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Глянцевые кнопки-ссылки квадратной формы из макета */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            aspect-ratio: 1.15 / 1; /* Сохраняем форму прямоугольников со скругленными углами */
            padding: 20px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px; /* Мягкие скругленные углы из макета */
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: linear-gradient(to bottom, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.25) 100%);
            box-shadow: 0 6px 18px rgba(0,0,0,0.06), inset 0 3px 3px rgba(255,255,255,0.6);
            color: #0369a1;
            text-shadow: 0 1px 1px rgba(255,255,255,0.8);
        }

        /* Эффект наведения (Hover) */
        .btn-link:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.35), inset 0 2px 5px rgba(255,255,255,0.8);
            background: linear-gradient(to bottom, rgba(255,255,255,0.95) 0%, rgba(219, 242, 255, 0.6) 100%);
            color: #0284c7;
        }

        /* Нажатие */
        .btn-link:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        /* Панель для выравнивания стрелки назад */
        .controls-panel {
            display: flex;
            justify-content: flex-end;
            margin-top: 25px;
        }

        /* Кнопка "Назад" в стиле primary (синий глянец) в форме стрелки из изображения image_fe0624.png */
        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            background: linear-gradient(to bottom, #38bdf8 0%, #0284c7 100%);
            color: white;
            border: 1px solid #0284c7;
            text-shadow: 0 -1px 1px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            /* Формируем стрелку вправо/назад с помощью clip-path как на эскизе */
            clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%);
            padding-right: 40px; /* Сдвиг текста влево из-за острия стрелки */
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.3), inset 0 2px 2px rgba(255,255,255,0.3);
        }

        .btn-back:hover {
            background: linear-gradient(to bottom, #7dd3fc 0%, #0369a1 100%);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.5);
            transform: translateX(-3px);
        }

        .btn-back:active {
            transform: translateX(0px);
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .screen {
                padding: 25px;
            }
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .header-plate {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="screen">
        <!-- Шапка-плашка "Проекты" -->
        <div class="header-plate">Проекты</div>

        <!-- Сетка кнопок с контентом из макета -->
        <div class="menu-grid">
            <!-- 1-й ряд -->
            <a href="ссылка_1.html" class="btn-link">Радиационная<br>гигиена</a>
            <a href="ссылка_2.html" class="btn-link">Гигиена детей<br>и подростков</a>
            <a href="HC/list.html" class="btn-link">Гигиена<br>коммунальная</a>

            <!-- 2-й ряд -->
            <a href="ссылка_4.html" class="btn-link">Гигиена труда</a>
            <a href="HF/list.html" class="btn-link">Гигиена питания</a>
            <a href="ссылка_6.html" class="btn-link">Эпидемиология</a>

            <!-- 3-й ряд -->
            <a href="ссылка_7.html" class="btn-link">Технологии<br>ГСЭН</a>
        </div>

        <!-- Панель со стрелкой НАЗАД -->
        <div class="controls-panel">
            <a href="../index.html" class="btn-back">назад</a>
        </div>
    </div>

</body>
</html>
