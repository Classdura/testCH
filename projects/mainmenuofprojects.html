<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню - Проекты</title>
    <style>
        /* Базовые настройки в стиле Dark Frutiger Aero */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 30%, #1a2a6c, #0a0f24, #020514);
            color: #e0f2fe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Декоративные глянцевые сферы на фоне (фишка стиля) */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            opacity: 0.3;
        }
        body::before {
            width: 300px;
            height: 300px;
            background: #00f2fe;
            top: 10%;
            left: 15%;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: #4facfe;
            bottom: 10%;
            right: 10%;
        }

        /* Контейнер интерфейса */
        .container {
            width: 100%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
        }

        /* Шапка "Проекты" с глянцевым бликом */
        .header {
            width: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 15px 0;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6), 0 0 10px rgba(0, 242, 254, 0.5);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        /* Сетка кнопок как на макете (3 колонки) */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        /* Скевоморфные стеклянные кнопки-ссылки */
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            aspect-ratio: 1.15 / 1; /* Делает их слегка прямоугольными как на фото */
            padding: 20px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            line-height: 1.4;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.03) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.3) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.3),
                        inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Верхний яркий полукруглый блик (эффект стекла) */
        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 5%;
            width: 90%;
            height: 45%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0));
            border-radius: 50% / 0 0 40% 40%;
            pointer-events: none;
        }

        /* Эффект при наведении */
        .menu-btn:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(0, 242, 254, 0.6);
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.2) 0%, rgba(79, 172, 254, 0.1) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.5) 100%);
            box-shadow: 0 12px 25px rgba(0, 242, 254, 0.3), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.5);
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }

        /* Эффект при нажатии */
        .menu-btn:active {
            transform: translateY(1px);
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4), 
                        inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* Нижняя панель с кнопкой "Назад" */
        .footer-panel {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Кнопка "Назад" в форме стрелки (аэро-стиль) */
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 25px;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            color: #020514;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%);
            padding-right: 35px; /* Запас под стрелку справа */
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4), inset 0 1px 0 rgba(255,255,255,0.4);
            transition: all 0.2s ease;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }

        .back-btn:hover {
            opacity: 0.9;
            transform: translateX(-3px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        /* Адаптивность под мобилки */
        @media (max-width: 768px) {
            .grid-menu {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .grid-menu {
                grid-template-columns: 1fr;
            }
            .header {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Проекты</div>

    <div class="grid-menu">
        <a href="#radiation" class="menu-btn">Радиационная<br>гигиена</a>
        <a href="#gdip" class="menu-btn">ГДИП</a>
        <a href="#communal" class="menu-btn">Гигиена<br>коммунальная</a>

        <a href="#labor" class="menu-btn">Гигиена труда</a>
        <a href="#nutrition" class="menu-btn">Гигиена питания</a>
        <a href="#epidemiology" class="menu-btn">Эпидемиология</a>

        <a href="#gseh" class="menu-btn">Технологии<br>ГСЭН</a>
    </div>

    <div class="footer-panel">
        <a href="#back" class="back-btn">назад</a>
    </div>
</div>

</body>
</html>
