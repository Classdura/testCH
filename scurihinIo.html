<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Корзина Скурихина: Настраиваемые нормы</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #27ae60;
            --protein: #3498db;
            --fat: #f1c40f;
            --carb: #e67e22;
            --micro: #9b59b6;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header { background: var(--primary); color: white; padding: 10px; text-align: center; }

        main {
    display: grid;
    grid-template-columns: 320px 1fr 380px; /* Ваша базовая разметка */
    gap: 15px;
    padding: 15px;
    flex: 1;
    overflow: hidden; /* Это важно для ноутбуков, чтобы скроллились только внутренние части */
}

        section {
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* Полка и форма */
        #product-list { overflow-y: auto; flex: 1; margin-bottom: 10px; }
        .product-card {
            padding: 10px; background: #f8f9fa; border: 1px solid #e9ecef;
            border-radius: 8px; margin-bottom: 5px; cursor: grab;
        }

        /* Корзина */
        #basket {
            flex: 1; border: 3px dashed #cbd5e0; border-radius: 12px;
            margin-bottom: 10px; overflow-y: auto; padding: 10px;
        }
        .basket-item {
            display: grid; grid-template-columns: 1fr 70px 30px 30px;
            align-items: center; gap: 5px; background: #fff;
            padding: 8px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 5px;
        }

        /* Аналитика и Нормы */
        #progress-scroll { overflow-y: auto; flex: 1; }
        .stat-row { margin-bottom: 12px; }
        .stat-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 4px; }
        
        .progress-container { height: 10px; background: #edf2f7; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.3s; }
        .over-limit { background-color: var(--danger) !important; }
        .limit-text { color: var(--danger); font-weight: bold; }

        .goals-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
            background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 15px;
        }
        .goals-grid label { font-size: 0.7rem; display: block; color: #666; }
        .goals-grid input { width: 100%; box-sizing: border-box; font-size: 0.8rem; }

        /* Таблица-чек */
        #summary-container { max-height: 150px; overflow: auto; font-size: 0.7rem; border-top: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #eee; padding: 3px; text-align: center; }

        input { padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; border: none; border-radius: 4px; }
        .add-btn { background: var(--accent); color: white; padding: 8px; width: 100%; margin-top: 5px; }
        .del-btn {
    min-width: 35px;
    min-height: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
} 
/* Специальные правила для мобильных устройств (экраны меньше 768px) */
@media screen and (max-width: 850px) {
    body {
        height: auto;
        overflow-y: auto; /* Разрешаем прокрутку всей страницы */
    }

    main {
        display: block !important; /* Отключаем сетку (grid) */
        padding: 10px;
        height: auto;
    }

    section {
        width: 100% !important;
        margin-bottom: 20px;
        max-height: none !important; /* Секции могут расти вниз */
        display: block;
    }

    #product-list, #basket, #progress-scroll {
        height: 300px; /* Фиксируем высоту внутренних списков, чтобы не были бесконечными */
        overflow-y: auto;
        border: 1px solid #ddd;
    }

    #basket {
        border: 2px dashed var(--accent); /* Выделяем корзину визуально */
        background: #fff;
    }

    .goals-grid {
        grid-template-columns: 1fr 1fr; /* Поля норм в 2 колонки на мобиле */
    }

    /* Таблица чека на мобильных */
    #summary-container {
        max-height: none;
        overflow-x: auto; /* Позволяем таблице листаться вправо-влево */
    }
    
    table {
        min-width: 600px; /* Чтобы колонки не слипались в кашу */
    }
}

/* Делаем кнопки удобными для нажатия пальцем */
button, .product-card {
    min-height: 44px; 
}
		}
    </style>

{ id: 590, category: "Жиры", name: "Масло пальмоядровое нерафинированное", cal: 897, prot: 0, fat: 99.7, carb: 0, vitA: 0, vitB1: 0, vitB2: 0, vitPP: 0, vitC: 0, ca: 0, p: 0, mg: 0, na: 0, k: 0, fe: 0, water: 0.3 },
{ id: 591, category: "Жиры", name: "Масло горчичное нерафинированное", cal: 898, prot: 0, fat: 99.8, carb: 0, vitA: 0, vitB1: 0, vitB2: 0, vitPP: 0, vitC: 0, ca: 0, p: 0, mg: 0, na: 0, k: 0, fe: 0, water: 0.2 }
    ];

    // Настраиваемые нормы
    let goals = {
        cal: 2000, prot: 100, fat: 60, carb: 250,
        vitA: 0.9, vitB1: 1.5, vitB2: 1.8, vitPP: 20, vitC: 90,
        ca: 1000, p: 800, mg: 400, na: 1300, k: 2500, fe: 18, water: 2000
    };

    let basket = [];

function init() {
    renderShelf();
    renderGoalsEditor();
    updateUI();

    const b = document.getElementById('basket');
    b.ondragover = (e) => e.preventDefault();
    b.ondrop = (e) => {
        const id = e.dataTransfer.getData('pid');
        addToBasket(id); // Используем нашу новую функцию
    };
}
	function addToBasket(id) {
    const p = products.find(x => x.id == id);
    if(p) {
        basket.push({...p, weight: 100, bId: Date.now()});
        updateUI();
    }
}

    function renderGoalsEditor() {
        const container = document.getElementById('goals-form');
        container.innerHTML = '';
        Object.keys(goals).forEach(key => {
            const div = document.createElement('div');
            div.innerHTML = `<label>${key.toUpperCase()}</label>
                             <input type="number" value="${goals[key]}" oninput="updateGoal('${key}', this.value)">`;
            container.appendChild(div);
        });
    }

    function updateGoal(key, val) {
        goals[key] = parseFloat(val) || 0;
        updateUI();
    }
function renderShelf() {
    const list = document.getElementById('product-list');
    const filter = document.getElementById('category-filter').value;
    list.innerHTML = '';
    
    products.forEach(p => {
        // Логика фильтрации
        const matchCategory = (filter === "Все") || (p.category === filter);
        const isMyProduct = (filter === "Мои" && p.isCustom);
        
        if (matchCategory || isMyProduct) {
            const d = document.createElement('div');
            d.className = 'product-card';
            d.draggable = true;
			d.onclick = () => addToBasket(p.id);
            const deleteBtn = p.isCustom 
                ? `<button onclick="deleteFromShelf(${p.id})" style="float:right; border:none; background:none; color:red; cursor:pointer;">×</button>` 
                : '';

            d.innerHTML = `
                ${deleteBtn}
                <strong>${p.name}</strong>
                <br><small>${p.cal} ккал | Б:${p.prot} Ж:${p.fat}</small>
            `;
			
            d.ondragstart = (e) => e.dataTransfer.setData('pid', p.id);
            list.appendChild(d);
        }
    });
}
function deleteFromShelf(id) {
    products = products.filter(p => p.id !== id);
    renderShelf();
}
function exportProducts() {
    const dataStr = JSON.stringify(products.filter(p => p.isCustom));
    const blob = new Blob([dataStr], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = "my_products.json";
    link.click();
}
function importProducts(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        const imported = JSON.parse(e.target.result);
        // Добавляем только те, которых еще нет (по ID)
        imported.forEach(p => {
            if (!products.find(old => old.id === p.id)) products.push(p);
        });
        renderShelf();
    };
    reader.readAsText(file);
}


    function updateUI() {
        renderBasket();
        renderProgress();
        renderSummary();
    }

    function renderBasket() {
        const b = document.getElementById('basket');
        b.innerHTML = '';
        basket.forEach(item => {
            const d = document.createElement('div');
            d.className = 'basket-item';
            d.innerHTML = `<span>${item.name}</span>
                           <input type="number" value="${item.weight}" oninput="changeW(${item.bId}, this.value)">
                           <span>г</span>
                           <button class="del-btn" onclick="removeI(${item.bId})">×</button>`;
            b.appendChild(d);
        });
    }

    function changeW(id, v) {
        const i = basket.find(x => x.bId === id);
        if(i) i.weight = parseFloat(v) || 0;
        updateUI();
    }

    function removeI(id) {
        basket = basket.filter(x => x.bId !== id);
        updateUI();
    }

    function renderProgress() {
        const total = basket.reduce((acc, i) => {
            const r = i.weight / 100;
            Object.keys(goals).forEach(k => acc[k] = (acc[k] || 0) + (i[k] * r));
            return acc;
        }, {});

        const container = document.getElementById('progress-scroll');
        container.innerHTML = '';

        Object.keys(goals).forEach(key => {
            const val = total[key] || 0;
            const goal = goals[key];
            const perc = Math.min((val / (goal || 1)) * 100, 100);
            const isOver = val > goal && goal > 0;

            container.innerHTML += `
                <div class="stat-row">
                    <div class="stat-info">
                        <span style="font-weight:bold">${key.toUpperCase()}</span>
                        <span class="${isOver ? 'limit-text' : ''}">${val.toFixed(1)} / ${goal} ${isOver ? '⚠' : ''}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill ${isOver ? 'over-limit' : ''}" 
                             style="width:${perc}%; background:${getCol(key)}"></div>
                    </div>
                </div>`;
        });
    }

    function getCol(k) {
        if(['cal','prot','fat','carb'].includes(k)) return '#3498db';
        if(k.startsWith('vit')) return '#9b59b6';
		if(k === 'water') return '#1abc9c'; // Бирюзовый цвет для воды
        return '#27ae60';
    }

    function renderSummary() {
        const body = document.getElementById('summary-body');
        body.innerHTML = '';
        basket.forEach(i => {
            const r = i.weight / 100;
            body.innerHTML += `<tr>
                <td>${i.name}</td><td>${i.weight}</td>
                <td>${(i.cal*r).toFixed(0)}</td><td>${(i.prot*r).toFixed(1)}</td>
                <td>${(i.fat*r).toFixed(1)}</td><td>${(i.carb*r).toFixed(1)}</td>
                <td>${(i.vitA*r).toFixed(2)}</td><td>${(i.vitC*r).toFixed(1)}</td>
                <td>${(i.ca*r).toFixed(0)}</td><td>${(i.fe*r).toFixed(1)}</td>
				<td>${(i.water * r).toFixed(1)}</td>
            </tr>`;
        });
    }

function addNewProduct() {
    const getValue = (id) => parseFloat(document.getElementById(id).value) || 0;
    const p = {
        id: Date.now(),
        isCustom: true,
        category: "Мои", // Автоматически помечаем как пользовательский
        name: document.getElementById('p-name').value || "Продукт",
        cal: getValue('p-cal'),
        prot: getValue('p-prot'),
        fat: getValue('p-fat'),
        carb: getValue('p-carb'),
        vitA: getValue('p-vitA'),
        vitB1: getValue('p-vitB1'),
        vitB2: getValue('p-vitB2'),
        vitPP: getValue('p-vitPP'),
        vitC: getValue('p-vitC'),
        ca: getValue('p-ca'),
        p: getValue('p-p'),
        mg: getValue('p-mg'),
        na: getValue('p-na'),
        k: getValue('p-k'),
        fe: getValue('p-fe'),
        water: getValue('p-water')
    };
    products.push(p);
    document.getElementById('category-filter').value = "Мои"; // Сразу переключаемся на "Мои"
    renderShelf();
}

    init();
</script>
